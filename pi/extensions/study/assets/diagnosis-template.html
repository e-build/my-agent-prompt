<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{CHAPTER_TITLE}} · 사전진단</title>
  <style>
    :root {
      --bg: #fafaf9;
      --surface: #ffffff;
      --surface-muted: #f5f5f4;
      --text: #171717;
      --muted: #737373;
      --faint: #a3a3a3;
      --line: #e7e5e4;
      --line-strong: #d6d3d1;
      --accent: #4f46e5;
      --success: #16a34a;
      --warning: #d97706;
      --danger: #dc2626;
      --shadow: 0 16px 40px rgba(23, 23, 23, 0.06);
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      line-height: 1.55;
      padding-bottom: 92px;
    }
    button, input, textarea { font: inherit; }
    button { cursor: pointer; }
    code { font-family: var(--mono); }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(250, 250, 249, 0.88);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(16px);
    }
    .topbarInner {
      width: min(760px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 14px 0 10px;
      display: grid;
      gap: 10px;
    }
    .topbarRow {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 18px;
    }
    .phase {
      font-family: var(--mono);
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    h1 {
      margin: 0;
      font-size: clamp(18px, 3.2vw, 24px);
      line-height: 1.18;
      letter-spacing: -0.035em;
      font-weight: 760;
    }
    .topMeta {
      display: flex;
      gap: 8px;
      align-items: center;
      flex: 0 0 auto;
      padding-top: 2px;
    }
    .metric {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
      padding: 5px 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255,255,255,.68);
      white-space: nowrap;
    }
    .metric.strong { color: var(--text); border-color: var(--line-strong); }
    .progressTrack {
      height: 4px;
      width: 100%;
      border-radius: 999px;
      background: var(--line);
      overflow: hidden;
    }
    .progressFill {
      width: 0%;
      height: 100%;
      border-radius: 999px;
      background: var(--accent);
      transition: width 240ms ease, background-color 240ms ease;
    }
    [data-state="waiting"] .progressFill {
      width: 100% !important;
      background: linear-gradient(90deg, var(--accent), #818cf8, var(--accent));
      background-size: 200% 100%;
      animation: pulseBar 1.2s linear infinite;
    }
    @keyframes pulseBar { from { background-position: 0% 0; } to { background-position: 200% 0; } }

    .content {
      width: min(760px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 28px 0 48px;
    }
    .intro {
      margin: 0 0 30px;
      color: var(--muted);
      font-size: 15px;
      max-width: 680px;
    }

    .gradeSummary {
      margin: 0 0 34px;
      padding: 20px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: var(--shadow);
    }
    .gradeSummaryTop {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 14px;
    }
    .scoreBig {
      font-family: var(--mono);
      font-size: clamp(32px, 8vw, 54px);
      line-height: 1;
      letter-spacing: -0.06em;
      font-weight: 850;
    }
    .gradeSummary h2 { margin: 0; font-size: 18px; letter-spacing: -0.03em; }
    .gradeSummary p { margin: 6px 0 0; color: var(--muted); }
    .weaknessList {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 14px 0 0;
      padding: 0;
      list-style: none;
    }
    .weaknessList li {
      font-size: 12px;
      color: var(--text);
      border: 1px solid var(--line);
      background: var(--surface-muted);
      border-radius: 999px;
      padding: 6px 9px;
    }

    .section { margin: 0 0 44px; }
    .sectionHeader {
      display: grid;
      gap: 4px;
      margin-bottom: 18px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--line);
    }
    .sectionLabel {
      font-family: var(--mono);
      color: var(--faint);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 720;
    }
    .sectionHeader h2 {
      margin: 0;
      font-size: 15px;
      line-height: 1.25;
      letter-spacing: -0.018em;
    }
    .sectionHeader p { margin: 0; color: var(--muted); font-size: 13px; }

    .question {
      position: relative;
      margin: 0 0 26px;
      padding: 0 0 26px;
      border-bottom: 1px solid var(--line);
    }
    .question:last-child { border-bottom: 0; margin-bottom: 0; }
    .question::before {
      content: "";
      position: absolute;
      left: -18px;
      top: 2px;
      bottom: 26px;
      width: 3px;
      border-radius: 999px;
      background: transparent;
    }
    .question.is-correct::before { background: var(--success); }
    .question.is-partial::before { background: var(--warning); }
    .question.is-wrong::before, .question.is-unanswered::before { background: var(--danger); }
    .question.missing .questionPrompt { color: var(--danger); }

    .questionHead {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 12px;
    }
    .questionNo {
      font-family: var(--mono);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.9;
      min-width: 28px;
    }
    .questionPrompt {
      margin: 0;
      font-size: 16px;
      line-height: 1.55;
      font-weight: 650;
      letter-spacing: -0.015em;
      white-space: pre-line;
    }
    .questionDesc { margin: 6px 0 0; color: var(--muted); font-size: 13px; }
    .questionMeta {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
      margin: 10px 0 0 40px;
      font-family: var(--mono);
      color: var(--muted);
      font-size: 11px;
    }
    .answerControl { margin: 14px 0 0 40px; }
    .choices { display: grid; gap: 8px; }
    .choice {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 10px;
      align-items: flex-start;
      padding: 10px 11px;
      min-height: 44px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: var(--surface);
      transition: border-color 160ms ease, background 160ms ease;
    }
    .choice:hover { border-color: var(--line-strong); background: var(--surface-muted); }
    .choice input { margin-top: 4px; accent-color: var(--accent); }
    .choiceLabel { font-family: var(--mono); color: var(--accent); font-weight: 760; margin-right: 5px; }
    textarea, input[type="text"] {
      width: 100%;
      min-height: 96px;
      resize: vertical;
      border: 1px solid var(--line-strong);
      border-radius: 12px;
      background: var(--surface);
      color: var(--text);
      padding: 11px 12px;
      outline: none;
      line-height: 1.55;
    }
    textarea:focus, input[type="text"]:focus, .choice:has(input:focus-visible) {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79,70,229,.14);
    }
    textarea.codeInput { min-height: 170px; font-family: var(--mono); font-size: 13px; tab-size: 2; }
    .rubric { margin: 10px 0 0 40px; color: var(--muted); font-size: 12px; }
    .constraints { margin: 8px 0 0 40px; color: var(--muted); font-size: 12px; font-family: var(--mono); }

    .questionFeedback {
      margin: 16px 0 0 40px;
      padding: 14px;
      border-radius: 14px;
      background: var(--surface-muted);
      border: 1px solid var(--line);
    }
    .resultHeader {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      margin-bottom: 12px;
      font-family: var(--mono);
      font-size: 12px;
    }
    .status.correct { color: var(--success); }
    .status.partial { color: var(--warning); }
    .status.wrong, .status.unanswered { color: var(--danger); }
    .answerGrid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    .resultBlock label {
      display: block;
      margin-bottom: 4px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .resultBlock div { white-space: pre-wrap; }
    .resultBlock + .resultBlock { margin-top: 10px; }

    .manualFallback {
      margin: 24px 0 0;
      padding: 16px;
      border: 1px dashed var(--line-strong);
      border-radius: 16px;
      background: var(--surface);
    }
    .manualFallback h2 { margin: 0 0 8px; font-size: 16px; }
    .manualFallback p { margin: 0 0 12px; color: var(--muted); font-size: 13px; }
    .manualFallback textarea { min-height: 128px; font-family: var(--mono); font-size: 12px; }
    .manualActions { display: flex; gap: 8px; flex-wrap: wrap; margin: 10px 0 18px; }

    .dock {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 30;
      border-top: 1px solid var(--line);
      background: rgba(250, 250, 249, 0.9);
      backdrop-filter: blur(16px);
    }
    .dockInner {
      width: min(760px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 12px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }
    .dockActions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .dockTitle { font-weight: 720; letter-spacing: -0.02em; }
    .dockStatus { color: var(--muted); font-size: 13px; }
    .btn {
      min-height: 44px;
      border: 1px solid var(--line-strong);
      border-radius: 12px;
      padding: 0 16px;
      background: var(--surface);
      color: var(--text);
      font-weight: 720;
      transition: transform 150ms ease, border-color 150ms ease, background 150ms ease;
    }
    .btn:hover { transform: translateY(-1px); border-color: var(--accent); }
    .btn:focus-visible { outline: 3px solid rgba(79,70,229,.18); outline-offset: 2px; }
    .btn.primary { background: var(--text); border-color: var(--text); color: #fff; }
    .btn.primary:hover { background: #262626; }
    .btn:disabled { opacity: .55; cursor: not-allowed; transform: none; }

    .gradingIndicator {
      display: none;
      margin: 28px 0 0;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--surface);
      color: var(--muted);
    }
    [data-state="waiting"] .gradingIndicator { display: block; }
    [data-state="waiting"] .answerControl { opacity: .5; pointer-events: none; }
    .resultsDock { display: none; }
    [data-state="results"] .resultsDock { display: block; }
    [data-state="results"] .answerControl,
    [data-state="results"] .rubric,
    [data-state="results"] .constraints,
    [data-state="results"] .intro,
    [data-state="results"] #dock { display: none; }

    .closedScreen {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 80;
      place-items: center;
      padding: 24px;
      background: rgba(250, 250, 249, 0.88);
      backdrop-filter: blur(12px);
    }
    .closedCard {
      width: min(460px, 100%);
      padding: 24px;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: var(--surface);
      box-shadow: var(--shadow);
      text-align: center;
    }
    .closedCard h2 { margin: 0; font-size: 22px; letter-spacing: -0.035em; }
    .closedCard p { margin: 10px 0 0; color: var(--muted); }
    .closedCountdown {
      margin: 0 auto 18px;
      width: 52px;
      height: 52px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: var(--text);
      color: #fff;
      font-family: var(--mono);
      font-size: 24px;
      font-weight: 850;
    }
    [data-state="closed"] { padding-bottom: 0; }
    [data-state="closed"] .topbar,
    [data-state="closed"] .content,
    [data-state="closed"] .dock {
      opacity: .18;
      filter: blur(2px);
      pointer-events: none;
    }
    [data-state="closed"] .closedScreen { display: grid; }
    [data-state="closed"] .resultsDock { display: none; }

    .hidden { display: none !important; }

    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; transition: none !important; scroll-behavior: auto !important; }
    }
    @media (max-width: 640px) {
      body { padding-bottom: 110px; }
      .topbarInner, .content, .dockInner { width: min(100% - 28px, 760px); }
      .topbarRow { display: grid; gap: 10px; }
      .topMeta { justify-content: flex-start; }
      .questionHead { grid-template-columns: 1fr; gap: 4px; }
      .questionNo { min-width: 0; }
      .questionMeta, .answerControl, .rubric, .constraints, .questionFeedback { margin-left: 0; }
      .answerGrid { grid-template-columns: 1fr; }
      .dockInner { align-items: stretch; flex-direction: column; }
      .btn { width: 100%; }
    }
  </style>
</head>
<body data-state="assess" data-chapter-slug="{{CHAPTER_SLUG}}" data-chapter-title="{{CHAPTER_TITLE}}" data-phase="{{PHASE}}">
  <script type="application/json" id="questions-data">{{QUESTIONS_JSON}}</script>

  <header class="topbar">
    <div class="topbarInner">
      <div class="topbarRow">
        <div>
          <div class="phase" id="phaseLabel">{{PHASE}}</div>
          <h1 id="chapterTitle">{{CHAPTER_TITLE}}</h1>
        </div>
        <div class="topMeta">
          <span class="metric" id="progressLabel">0/0</span>
          <span class="metric strong" id="scoreLabel">100점</span>
        </div>
      </div>
      <div class="progressTrack" aria-hidden="true"><div class="progressFill" id="progressFill"></div></div>
    </div>
  </header>

  <main class="content">
    <p class="intro" id="introText">현재 이해 수준을 확인합니다. 모르는 문항은 “모른다”고 답하세요.</p>
    <section class="gradeSummary hidden" id="gradeSummary"></section>
    <div id="sectionsRoot"></div>
    <div class="gradingIndicator" id="gradingIndicator">Pi가 채점 중입니다. 결과가 준비되면 이 화면으로 돌아옵니다.</div>
    <section class="manualFallback hidden" id="manualFallback">
      <h2>수동 제출</h2>
      <p>자동 제출이 되지 않을 때만 사용합니다.</p>
      <textarea id="submissionOutput" spellcheck="false" placeholder="제출 패키지"></textarea>
      <div class="manualActions">
        <button class="btn" type="button" id="copySubmitBtn">제출 패키지 복사</button>
      </div>
      <textarea id="gradeInput" spellcheck="false" placeholder="채점 JSON을 붙여넣으세요"></textarea>
      <div class="manualActions">
        <button class="btn primary" type="button" id="loadGradeBtn">결과 보기</button>
      </div>
      <div id="manualStatus" class="dockStatus"></div>
    </section>
  </main>

  <footer class="dock" id="dock">
    <div class="dockInner">
      <div>
        <div class="dockTitle" id="dockTitle">진단 중</div>
        <div class="dockStatus" id="dockStatus">답변을 작성하세요.</div>
      </div>
      <button class="btn primary" type="button" id="submitBtn">제출하기</button>
    </div>
  </footer>

  <footer class="dock resultsDock" id="resultsDock">
    <div class="dockInner">
      <div>
        <div class="dockTitle">결과 확인 완료</div>
        <div class="dockStatus" id="resultsDockStatus">결과를 충분히 확인했다면 다음 단계로 넘어가세요.</div>
      </div>
      <div class="dockActions">
        <button class="btn" type="button" id="copyWeaknessBtn">취약점 요약 복사</button>
        <button class="btn primary" type="button" id="continueBtn">Pi에서 개념 학습 시작 →</button>
      </div>
    </div>
  </footer>

  <section class="closedScreen" id="closedScreen" aria-live="polite">
    <div class="closedCard">
      <div class="closedCountdown" id="closedCountdown">3</div>
      <h2 id="closedTitle">Pi로 넘겼습니다</h2>
      <p id="closedMessage">개념 학습은 Pi에서 이어집니다.</p>
      <p>이 탭은 닫으셔도 됩니다.</p>
    </div>
  </section>

  <script>
    (function () {
      const body = document.body;
      const fallbackData = {
        version: "1.0",
        instructions: "문항 데이터가 없습니다.",
        totalPoints: 0,
        sections: [],
        questions: []
      };

      const rawData = document.getElementById("questions-data").textContent.trim();
      const data = parseInitialData(rawData) || fallbackData;
      const metadata = {
        chapterSlug: cleanPlaceholder(body.dataset.chapterSlug, data.chapterSlug || "unknown-chapter"),
        chapterTitle: cleanPlaceholder(body.dataset.chapterTitle, data.chapterTitle || "사전진단"),
        phase: cleanPlaceholder(body.dataset.phase, data.phase || "diagnosis"),
        version: data.version || "1.0"
      };
      const storageKey = `study-diagnosis:${metadata.chapterSlug}:${metadata.phase}:answers`;
      const gradeStorageKey = `study-diagnosis:${metadata.chapterSlug}:${metadata.phase}:grade`;
      const answers = loadJson(storageKey, {});
      let gradeResults = loadJson(gradeStorageKey, null);
      let pollTimer = null;

      const sections = Array.isArray(data.sections) ? data.sections : [];
      const questions = Array.isArray(data.questions) ? data.questions : [];
      const questionById = new Map(questions.map(q => [q.id, q]));
      const questionNumberById = new Map(questions.map((q, index) => [q.id, index + 1]));

      const els = {
        phaseLabel: byId("phaseLabel"),
        chapterTitle: byId("chapterTitle"),
        progressLabel: byId("progressLabel"),
        scoreLabel: byId("scoreLabel"),
        progressFill: byId("progressFill"),
        introText: byId("introText"),
        gradeSummary: byId("gradeSummary"),
        sectionsRoot: byId("sectionsRoot"),
        manualFallback: byId("manualFallback"),
        submissionOutput: byId("submissionOutput"),
        copySubmitBtn: byId("copySubmitBtn"),
        gradeInput: byId("gradeInput"),
        loadGradeBtn: byId("loadGradeBtn"),
        manualStatus: byId("manualStatus"),
        dock: byId("dock"),
        dockTitle: byId("dockTitle"),
        dockStatus: byId("dockStatus"),
        submitBtn: byId("submitBtn"),
        resultsDockStatus: byId("resultsDockStatus"),
        copyWeaknessBtn: byId("copyWeaknessBtn"),
        continueBtn: byId("continueBtn"),
        closedCountdown: byId("closedCountdown"),
        closedTitle: byId("closedTitle"),
        closedMessage: byId("closedMessage")
      };

      init();

      function init() {
        document.title = `${metadata.chapterTitle} · 사전진단`;
        els.phaseLabel.textContent = metadata.phase;
        els.chapterTitle.textContent = metadata.chapterTitle;
        els.introText.textContent = data.instructions || els.introText.textContent;
        els.scoreLabel.textContent = `${data.totalPoints || sumPoints(questions)}점`;
        renderSections();
        wireControls();
        updateProgress();
        if (gradeResults) renderGrade(gradeResults);
        else checkExistingResult();
      }

      function parseInitialData(raw) {
        if (!raw || /^\s*\{\{[A-Z_]+\}\}\s*$/.test(raw)) return null;
        try { return JSON.parse(raw); } catch (error) { console.warn("questions data parse failed", error); return null; }
      }
      function cleanPlaceholder(value, fallback) {
        if (!value || /^\{\{.+\}\}$/.test(value)) return fallback;
        return value;
      }
      function byId(id) { return document.getElementById(id); }
      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }
      function loadJson(key, fallback) {
        try {
          const raw = localStorage.getItem(key);
          return raw ? JSON.parse(raw) : fallback;
        } catch { return fallback; }
      }
      function saveAnswers() { localStorage.setItem(storageKey, JSON.stringify(answers)); }
      function sumPoints(items) { return items.reduce((sum, q) => sum + Number(q.points || 0), 0); }
      function cssEscape(value) {
        if (window.CSS && typeof window.CSS.escape === "function") return window.CSS.escape(String(value));
        return String(value).replace(/[^a-zA-Z0-9_-]/g, "\\$&");
      }

      function renderSections() {
        els.sectionsRoot.innerHTML = sections.map((section, sectionIndex) => renderSection(section, sectionIndex)).join("");
        questions.forEach(q => wireQuestion(q));
      }
      function renderSection(section, sectionIndex) {
        const qs = questionsForSection(section);
        return `<section class="section" id="section-${escapeHtml(section.id)}">
          <header class="sectionHeader">
            <div class="sectionLabel">section ${String(sectionIndex + 1).padStart(2, "0")}</div>
            <h2>${escapeHtml(section.title || section.id)}</h2>
            ${section.description ? `<p>${escapeHtml(section.description)}</p>` : ""}
          </header>
          ${qs.map(q => renderQuestion(q)).join("")}
        </section>`;
      }
      function questionsForSection(section) {
        if (Array.isArray(section.questionIds) && section.questionIds.length > 0) {
          return section.questionIds.map(id => questionById.get(id)).filter(Boolean);
        }
        return questions.filter(q => q.sectionId === section.id);
      }
      function renderQuestion(q) {
        const number = questionNumberById.get(q.id) || 0;
        const required = q.required !== false;
        return `<article class="question" id="q-${escapeHtml(q.id)}" data-question-id="${escapeHtml(q.id)}">
          <div class="questionHead">
            <div class="questionNo">${String(number).padStart(2, "0")}</div>
            <div>
              <p class="questionPrompt">${escapeHtml(q.prompt)}</p>
              ${q.description ? `<p class="questionDesc">${escapeHtml(q.description)}</p>` : ""}
            </div>
          </div>
          <div class="questionMeta">
            <span>${escapeHtml(typeToLabel(q.type))}</span>
            <span>${Number(q.points || 0)}점</span>
            ${required ? `<span>필수</span>` : `<span>선택</span>`}
          </div>
          <div class="answerControl">${renderAnswerControl(q)}</div>
          ${renderConstraints(q)}
          ${renderRubric(q)}
          <div class="questionFeedback hidden" data-feedback-for="${escapeHtml(q.id)}"></div>
        </article>`;
      }
      function renderAnswerControl(q) {
        const type = q.type || "short-answer";
        if (type === "single-choice" || type === "multiple-choice") {
          const inputType = type === "single-choice" ? "radio" : "checkbox";
          const options = Array.isArray(q.options) ? q.options : [];
          return `<div class="choices">${options.map((option, index) => {
            const opt = normalizeOption(option, index);
            return `<label class="choice">
              <input type="${inputType}" name="answer-${escapeHtml(q.id)}" value="${escapeHtml(opt.id)}" data-answer-input="${escapeHtml(q.id)}" />
              <span><span class="choiceLabel">${escapeHtml(opt.label)}</span>${escapeHtml(opt.text)}</span>
            </label>`;
          }).join("")}</div>`;
        }
        const rows = type === "essay" ? 8 : (type === "code" || type === "sql" ? 9 : 4);
        const klass = type === "code" || type === "sql" ? "codeInput" : "";
        const placeholder = q.placeholder || (type === "essay" ? "근거와 함께 답하세요." : "답변을 입력하세요.");
        return `<textarea class="${klass}" rows="${rows}" data-answer-input="${escapeHtml(q.id)}" placeholder="${escapeHtml(placeholder)}"></textarea>`;
      }
      function normalizeOption(option, index) {
        if (typeof option === "string") return { id: String.fromCharCode(65 + index), label: String.fromCharCode(65 + index), text: option };
        const id = String(option.id ?? option.value ?? String.fromCharCode(65 + index));
        return { id, label: String(option.label ?? id), text: String(option.text ?? option.label ?? option.value ?? "") };
      }
      function renderConstraints(q) {
        if (!q.constraints) return "";
        const entries = Array.isArray(q.constraints) ? q.constraints : Object.entries(q.constraints).map(([k, v]) => `${k}: ${v}`);
        return entries.length ? `<div class="constraints">${entries.map(escapeHtml).join(" · ")}</div>` : "";
      }
      function renderRubric(q) {
        if (!q.rubric) return "";
        const items = Array.isArray(q.rubric) ? q.rubric : [q.rubric];
        return items.length ? `<div class="rubric">기준: ${items.map(escapeHtml).join(" · ")}</div>` : "";
      }

      function wireQuestion(q) {
        const value = answers[q.id];
        const inputs = Array.from(document.querySelectorAll(`[data-answer-input="${cssEscape(q.id)}"]`));
        inputs.forEach(input => {
          input.addEventListener("input", () => handleInput(q));
          input.addEventListener("change", () => handleInput(q));
          if (input.type === "radio") input.checked = value === input.value;
          else if (input.type === "checkbox") input.checked = Array.isArray(value) && value.includes(input.value);
          else input.value = value || "";
        });
      }
      function handleInput(q) {
        answers[q.id] = readAnswerFromDom(q);
        saveAnswers();
        updateProgress();
      }
      function readAnswerFromDom(q) {
        const inputs = Array.from(document.querySelectorAll(`[data-answer-input="${cssEscape(q.id)}"]`));
        if (q.type === "single-choice") return (inputs.find(i => i.checked) || {}).value || "";
        if (q.type === "multiple-choice") return inputs.filter(i => i.checked).map(i => i.value);
        return inputs[0] ? inputs[0].value.trim() : "";
      }
      function isAnswered(q) {
        const value = answers[q.id];
        if (Array.isArray(value)) return value.length > 0;
        return String(value ?? "").trim().length > 0;
      }
      function updateProgress(markMissing) {
        const answered = questions.filter(isAnswered).length;
        const requiredMissing = questions.filter(q => q.required !== false && !isAnswered(q));
        const percent = questions.length ? Math.round((answered / questions.length) * 100) : 0;
        if (body.dataset.state !== "results") els.progressFill.style.width = `${percent}%`;
        els.progressLabel.textContent = `${answered}/${questions.length}`;
        els.dockStatus.textContent = requiredMissing.length ? `${requiredMissing.length}개 필수 문항이 남았습니다.` : `${answered}/${questions.length} 답변 완료`;
        questions.forEach(q => {
          const node = byId(`q-${q.id}`);
          if (!node) return;
          node.classList.toggle("missing", Boolean(markMissing && q.required !== false && !isAnswered(q)));
        });
      }

      function wireControls() {
        els.submitBtn.addEventListener("click", submitAnswers);
        els.copySubmitBtn.addEventListener("click", async () => copyText(els.submissionOutput.value, els.manualStatus));
        els.loadGradeBtn.addEventListener("click", () => {
          const parsed = parseJsonFromText(els.gradeInput.value);
          if (!parsed) return setManualStatus("채점 JSON을 읽지 못했습니다.", "bad");
          renderGrade(parsed);
        });
        els.copyWeaknessBtn.addEventListener("click", async () => copyText(buildWeaknessSummary(), els.resultsDockStatus));
        els.continueBtn.addEventListener("click", acknowledgeResults);
      }
      async function submitAnswers() {
        updateProgress(true);
        const firstMissing = questions.find(q => q.required !== false && !isAnswered(q));
        if (firstMissing) {
          byId(`q-${firstMissing.id}`)?.scrollIntoView({ behavior: "smooth", block: "center" });
          els.dockStatus.textContent = "필수 문항을 먼저 채워주세요.";
          return;
        }
        const payload = buildSubmissionPayload();
        const submitUrl = getSubmitUrl();
        els.submissionOutput.value = buildSubmissionText(payload);
        if (!submitUrl) {
          showManualFallback("자동 제출 연결이 없습니다. 제출 패키지를 복사해 Pi 채팅에 붙여넣으세요.");
          return;
        }
        setPhase("waiting");
        try {
          const res = await fetch(submitUrl, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
          if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
          const result = await safeJson(res);
          if (result && result.grade) return renderGrade(result.grade);
          const resultUrl = getResultUrl();
          if (resultUrl) startResultPolling(resultUrl);
          else showManualFallback("제출은 완료됐지만 결과 polling 주소가 없습니다. AI 응답의 채점 JSON을 붙여넣으세요.");
        } catch (error) {
          showManualFallback(`자동 제출 실패: ${error.message}. 제출 패키지를 복사해 Pi 채팅에 붙여넣으세요.`);
        }
      }
      function setPhase(phase) {
        body.dataset.state = phase;
        if (phase === "assess") {
          els.dockTitle.textContent = "진단 중";
          els.submitBtn.disabled = false;
          els.submitBtn.textContent = "제출하기";
        } else if (phase === "waiting") {
          els.dockTitle.textContent = "채점 중";
          els.dockStatus.textContent = "Pi 세션에서 채점 중입니다.";
          els.submitBtn.disabled = true;
          els.submitBtn.textContent = "채점 중";
        } else if (phase === "results") {
          els.dockTitle.textContent = "결과 확인";
        }
      }
      function showManualFallback(message) {
        setPhase("assess");
        els.manualFallback.classList.remove("hidden");
        els.manualFallback.scrollIntoView({ behavior: "smooth", block: "start" });
        setManualStatus(message, "warn");
      }
      function setManualStatus(message, kind) {
        els.manualStatus.textContent = message;
        els.manualStatus.style.color = kind === "bad" ? "var(--danger)" : kind === "good" ? "var(--success)" : "var(--warning)";
      }

      function buildSubmissionPayload() {
        return {
          kind: "study-diagnosis-submission",
          submittedAt: new Date().toISOString(),
          metadata,
          exam: {
            totalPoints: data.totalPoints || sumPoints(questions),
            instructions: data.instructions || "",
            sections: sections.map(s => ({ id: s.id, title: s.title, questionIds: questionsForSection(s).map(q => q.id) }))
          },
          answers: questions.map(q => ({
            id: q.id,
            type: q.type,
            sectionId: q.sectionId,
            prompt: q.prompt,
            points: Number(q.points || 0),
            required: q.required !== false,
            rubric: q.rubric || [],
            constraints: q.constraints || null,
            answer: answers[q.id] ?? (q.type === "multiple-choice" ? [] : "")
          })),
          gradingRequest: {
            language: "ko",
            returnFormat: "DIAGNOSIS_GRADE_JSON",
            instruction: "채점 후 점수, 오답/부분정답, 약점 분야, 권장 학습 깊이, 문항별 정답과 해설을 JSON으로 반환하세요."
          }
        };
      }
      function buildSubmissionText(payload) {
        return [
          "# DIAGNOSIS_SUBMISSION",
          "아래 JSON을 기준으로 사전진단을 채점하세요.",
          "",
          "```json",
          JSON.stringify(payload, null, 2),
          "```"
        ].join("\n");
      }

      function getSubmitUrl() {
        const params = new URLSearchParams(location.search);
        return params.get("submitUrl") || window.DIAGNOSIS_SUBMIT_URL || "";
      }
      function getResultUrl() {
        const params = new URLSearchParams(location.search);
        return params.get("resultUrl") || window.DIAGNOSIS_RESULT_URL || "";
      }
      function getAckUrl() {
        const params = new URLSearchParams(location.search);
        return params.get("ackUrl") || window.DIAGNOSIS_ACK_URL || "";
      }
      function buildWeaknessSummary() {
        if (!gradeResults) return "진단 결과 요약이 없습니다.";
        const score = gradeResults.totalScore ?? "?";
        const max = gradeResults.maxScore ?? "?";
        const level = gradeResults.level ? ` (${gradeResults.level})` : "";
        const weaknesses = Array.isArray(gradeResults.weaknesses) ? gradeResults.weaknesses : [];
        const lines = [`사전진단 결과: ${score}/${max}${level}`];
        if (weaknesses.length) lines.push(`취약 분야: ${weaknesses.join(", ")}`);
        return lines.join("\n");
      }
      async function acknowledgeResults() {
        if (!gradeResults) return;
        const ackUrl = getAckUrl();
        if (!ackUrl) {
          els.resultsDockStatus.textContent = "Pi 연결이 없습니다. Pi 터미널로 돌아가 개념 학습을 시작하세요.";
          els.continueBtn.disabled = true;
          return;
        }
        const payload = {
          score: gradeResults.totalScore ?? null,
          maxScore: gradeResults.maxScore ?? null,
          level: gradeResults.level ?? null,
          weaknesses: Array.isArray(gradeResults.weaknesses) ? gradeResults.weaknesses : []
        };
        els.continueBtn.disabled = true;
        els.continueBtn.textContent = "전송 중…";
        try {
          const res = await fetch(ackUrl, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
          if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
          els.continueBtn.textContent = "✓ 완료";
          els.resultsDockStatus.textContent = "Pi로 넘겼습니다. 3초 뒤 종료 화면으로 전환합니다.";
          startCloseCountdown();
        } catch (error) {
          els.continueBtn.disabled = false;
          els.continueBtn.textContent = "Pi에서 개념 학습 시작 →";
          els.resultsDockStatus.textContent = `전송 실패: ${error.message}. Pi 터미널에서 직접 진행해 주세요.`;
        }
      }
      function startCloseCountdown() {
        let remaining = 3;
        els.closedCountdown.textContent = String(remaining);
        els.closedTitle.textContent = "Pi로 넘겼습니다";
        els.closedMessage.textContent = "개념 학습은 Pi에서 이어집니다.";
        body.dataset.state = "closed";
        const timer = setInterval(() => {
          remaining -= 1;
          els.closedCountdown.textContent = String(Math.max(remaining, 0));
          if (remaining <= 0) {
            clearInterval(timer);
            els.closedCountdown.textContent = "✓";
            try { window.close(); } catch {}
          }
        }, 1000);
      }
      async function checkExistingResult() {
        const resultUrl = getResultUrl();
        if (!resultUrl) return;
        try {
          const data = await fetchResult(resultUrl);
          if (data && data.status === "graded" && data.grade) renderGrade(data.grade);
        } catch {}
      }
      function startResultPolling(url) {
        if (pollTimer) clearInterval(pollTimer);
        let attempts = 0;
        const tick = async () => {
          attempts++;
          try {
            const data = await fetchResult(url);
            if (data && data.status === "graded" && data.grade) {
              clearInterval(pollTimer);
              pollTimer = null;
              renderGrade(data.grade);
            }
          } catch {}
          if (attempts > 600) {
            clearInterval(pollTimer);
            pollTimer = null;
            showManualFallback("채점 대기 시간이 초과했습니다. AI 응답의 채점 JSON을 붙여넣으세요.");
          }
        };
        tick();
        pollTimer = setInterval(tick, 1500);
      }
      async function fetchResult(url) {
        const res = await fetch(url, { headers: { Accept: "application/json" } });
        if (!res.ok) return null;
        return safeJson(res);
      }
      async function safeJson(res) { try { return await res.json(); } catch { return null; } }
      function parseJsonFromText(text) {
        const trimmed = text.trim();
        if (!trimmed) return null;
        const marker = trimmed.match(/<!--DIAGNOSIS_GRADE_JSON_START-->[\s\S]*?```(?:json)?\s*([\s\S]*?)```[\s\S]*?<!--DIAGNOSIS_GRADE_JSON_END-->/i);
        const block = marker ? marker[1] : (trimmed.match(/```(?:json)?\s*([\s\S]*?)```/i)?.[1] || trimmed);
        try { return JSON.parse(block.trim()); } catch { return null; }
      }

      function renderGrade(grade) {
        gradeResults = grade;
        localStorage.setItem(gradeStorageKey, JSON.stringify(grade));
        setPhase("results");
        const score = Number(grade.totalScore ?? 0);
        const maxScore = Number(grade.maxScore ?? data.totalPoints ?? sumPoints(questions));
        const pct = maxScore ? Math.round((score / maxScore) * 100) : 0;
        els.progressFill.style.width = `${Math.max(0, Math.min(100, pct))}%`;
        els.progressFill.style.background = pct >= 70 ? "var(--success)" : pct >= 40 ? "var(--warning)" : "var(--danger)";
        els.progressLabel.textContent = `${score}/${maxScore}`;
        els.scoreLabel.textContent = grade.level || "결과";
        els.gradeSummary.classList.remove("hidden");
        const weaknesses = Array.isArray(grade.weaknesses) ? grade.weaknesses : [];
        els.gradeSummary.innerHTML = `<div class="gradeSummaryTop">
          <div>
            <div class="scoreBig">${escapeHtml(score)}<span style="font-size:.42em;color:var(--muted)">/${escapeHtml(maxScore)}</span></div>
          </div>
          <div>
            <h2>${escapeHtml(grade.summary || "진단 결과")}</h2>
            <p>${escapeHtml(grade.recommendation || "결과를 확인하고 약한 문항부터 보완하세요.")}</p>
          </div>
        </div>
        ${weaknesses.length ? `<ul class="weaknessList">${weaknesses.map(w => `<li>${escapeHtml(w)}</li>`).join("")}</ul>` : ""}`;

        const results = Array.isArray(grade.results) ? grade.results : [];
        const resultById = new Map(results.map(r => [r.id, r]));
        questions.forEach(q => {
          const result = resultById.get(q.id);
          const node = byId(`q-${q.id}`);
          const feedback = document.querySelector(`[data-feedback-for="${cssEscape(q.id)}"]`);
          if (!node || !feedback || !result) return;
          const status = result.status || "checked";
          node.classList.remove("is-correct", "is-partial", "is-wrong", "is-unanswered");
          node.classList.add(status === "correct" ? "is-correct" : status === "partial" ? "is-partial" : status === "unanswered" ? "is-unanswered" : "is-wrong");
          feedback.classList.remove("hidden");
          feedback.innerHTML = `<div class="resultHeader">
            <span class="status ${escapeHtml(status)}">${escapeHtml(statusToLabel(status))}</span>
            <span>${escapeHtml(result.score ?? 0)} / ${escapeHtml(result.maxScore ?? q.points ?? 0)}점</span>
          </div>
          <div class="answerGrid">
            <div class="resultBlock"><label>내 답</label><div>${escapeHtml(formatAnswer(answers[q.id]))}</div></div>
            <div class="resultBlock"><label>정답</label><div>${escapeHtml(result.correctAnswer || "제공 없음")}</div></div>
          </div>
          <div class="resultBlock"><label>해설</label><div>${escapeHtml(result.explanation || "제공 없음")}</div></div>
          <div class="resultBlock"><label>보완</label><div>${escapeHtml(result.advice || "제공 없음")}</div></div>`;
        });
        window.scrollTo({ top: 0, behavior: "smooth" });
      }
      function statusToLabel(status) {
        return ({ correct: "정답", partial: "부분 정답", wrong: "오답", unanswered: "미답변" })[status] || "채점됨";
      }
      function formatAnswer(value) {
        if (Array.isArray(value)) return value.length ? value.join(", ") : "미답변";
        const text = String(value ?? "").trim();
        return text || "미답변";
      }
      async function copyText(text, statusEl) {
        try {
          await navigator.clipboard.writeText(text);
          statusEl.textContent = "복사했습니다.";
          statusEl.style.color = "var(--success)";
        } catch {
          statusEl.textContent = "복사 권한이 없습니다. 직접 선택해 복사하세요.";
          statusEl.style.color = "var(--warning)";
        }
      }
      function typeToLabel(type) {
        return ({ "single-choice": "객관식", "multiple-choice": "복수선택", "short-answer": "주관식", essay: "서술형", code: "코드", sql: "SQL" })[type] || type || "문항";
      }
    })();
  </script>
</body>
</html>
